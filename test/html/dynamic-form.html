<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DynamicForm Demo</title>
    <link rel="stylesheet" href="../css/corporate-landing.css" />
    <link rel="stylesheet" href="../css/dynamic-form.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      body {
        background: var(--color-bg, #17171b);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 60px 20px;
        gap: 20px;
      }

      .theme-toggle-btn {
        padding: 10px 20px;
        border-radius: 30px;
        border: 1px solid var(--df-border);
        background: var(--df-surface);
        color: var(--df-text);
        cursor: pointer;
        font-family: var(--font-family);
        font-weight: 500;
        transition: all 0.2s ease;
        margin-bottom: 20px;
      }

      .theme-toggle-btn:hover {
        border-color: var(--color-cyan);
        box-shadow: 0 0 10px var(--df-accent-glow);
      }

      #form-container {
        min-height: 200px;
        width: 100%;
      }

      .card {
        width: 100%;
        max-width: 744px;
        background: var(--card-bg);
        border: 1px solid var(--df-border);
        border-radius: 20px;
        padding: 40px;
      }
    </style>
  </head>
  <body>
    <button class="theme-toggle-btn" id="theme-toggle">Toggle Light/Dark Mode</button>

    <div class="card">
      <div id="form-container"></div>
    </div>

    <script src="../../js/dynamic-form.js"></script>
    <script>
      const themeToggle = document.getElementById("theme-toggle");
      const htmlElement = document.documentElement;

      themeToggle.addEventListener("click", () => {
        const currentTheme = htmlElement.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";

        htmlElement.setAttribute("data-theme", newTheme);

        localStorage.setItem("preferred-theme", newTheme);
      });

      const savedTheme = localStorage.getItem("preferred-theme");
      if (savedTheme) {
        htmlElement.setAttribute("data-theme", savedTheme);
      }

      const container = document.getElementById("form-container");

      new DynamicForm({
        type: "multiple",
        apiBaseUrl: "https://servicewand.com",
        lang: "en",
        formTypeCode: "GENERAL_PARTNERS_FORM",
        organizationId: 2,
        submitLabel: "Send a request",
        withLabel: true,
        descriptionRender: "node",
        presetAttributes: {
          PARTNER_TYPE: "IMPLEMENTATION_PARTNER",
        },
        onSubmit: function (data) {
          console.log("[DynamicForm] Submitted:", data);
          alert("✅ Submitted!\n\n" + JSON.stringify(data, null, 2));
        },
      }).mount("#form-container");
    </script>
  </body>
</html>
